<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="icon" type="image.png" sizes="32x32" href="./img/fav.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>

<body>

    <p>
        <a href="../index.html" target="_self" rel="prev"> <img src="./img/home.png" alt="home" width="50px"></a>
    </p>

    <form action="fablucaslv@gmail.com" method="get">
        <label for="nome">Nome:</label>
        <input type="text" id="" name="nome-usuario01" size="40" maxlength="100" value=""
            placeholder="Digite o nome completo do usuário:">
        <br>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="Email" name="email" placeholder="Digite o Email do usuário:" size="40" maxlength="100">
        <br> <br>
        <label for="numero">Tel:</label>
        <input type="text" name="telefone" id="telefone" size="40" maxlength="100"
            placeholder="Digite aqui o  seu telefone">

        <br>
        <br>

        <label for="pjpf">Pessoa Jurídica</label>
        <input type="radio" id="pj" name="pjpf">

        <br>

        <label for="pjpf">Pessoa Física</label>
        <input type="radio" id="pf" name="pjpf">

        <br>
        <br>

        <input type="checkbox" id="Serviço 1">
        <label for="Serviço 1" value="s1">Serviço 1</label>
        <input type="checkbox" id="Serviço 2">
        <label for="Serviço 2" value="s2">Serviço 2</label>
        <input type="checkbox" id="Serviço 3">
        <label for="Serviço 3" value="s3"> Serviço 3</label>
        <input type="checkbox" id="Serviço 4">
        <label for="Serviço 4" value="s4">Serviço 4</label>

        <br>
        <br>

        <label for="">Horários de interesse</label>
        <select name="horarios" size="1">
            <option value="">selecione</option>
            <option value="1:50">1:50</option>
            <option value="2:50">2:50</option>
            <option value="3:50">3:50</option>
            <option value="4:50">4:50</option>
        </select>


        <br>
        <br>

        <textarea name="demanda" cols="50" rows="10"
            placeholder="Escreva aqui sua demanda e ou sua proposta:"></textarea>
        <br>
        <input type="submit" value="Enviar pedido">
        <input type="reset" value="Limpar">
    </form>
</body>

</html>
